<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register Form</title>
    <style>
        body{
            background-color:#152733;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form-box{
            width: 550px;
            border: 3px solid white;
            padding: 30px;
            border-radius: 15px;
            color: white;
            background-color: #152733;
        
        }
        .container{
            border: 2px solid white;
            padding: 30px;
            width: 400px;
            border-radius: 10px;
            color: white;
        }
        h1{
            font-weight: bold;
        }

    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <div class="form-box">    
        <form>
     <div class="container">        
    <h1>Register Today</h1>
    <p>Fill in the data below.</p>
    <div>
    <input type="text" class="form-control mb-3" placeholder="Full Name">
    <input type="email"class="form-control mb-3" placeholder="E-mail Address">
    <select class="form-select mb-3">
        <option selected>Position</option>
        <option>developer</option>
        <option>teacher</option>
        <option>student</option>
    </select>
    <input type="password" class="form-control mb-3" placeholder="Password">
  </div>
  <div class="gender br mb-3">
    <label for="gender">Gender :</label>
    <button type="radio" name="gender" class="btn btn-outline-light btn-sm">Male</button>
    <button type="radio" name="gender" class="btn btn-outline-light btn-sm">Female</button>
    <button type="radio" name="gender" class="btn btn-outline-light btn-sm">Secret</button><br>
    <input type="checkbox"> I confirm that all data are correct<br><br>
    <button class="btn btn-secondary">Register</button>
  </div>
  </div>
   </form>
  </div>
  </body>
</html>
